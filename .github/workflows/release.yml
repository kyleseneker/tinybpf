name: Release

# Release workflow: deliberately untouched by the CI-shrink pass. Tag-driven
# release plumbing is load-bearing and any change here risks a bad publish.
# If you need to edit this, do it in its own PR with a dry run.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: false

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Build release artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: build --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test release artifacts
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          found=0

          for binary in $(find dist -name tinybpf -type f); do
            echo "--- $binary ---"
            file "$binary"
            found=$((found + 1))

            case "$binary" in
              *linux_amd64*)
                chmod +x "$binary"
                "$binary" version
                "$binary" --help
                got=$("$binary" version)
                if ! echo "$got" | grep -qF "$tag_version"; then
                  echo "ERROR: version mismatch: got '$got', expected to contain '$tag_version'"
                  exit 1
                fi
                echo "Smoke test passed: $got"
                ;;
              *linux_arm64*)
                file "$binary" | grep -q "ELF 64-bit" || { echo "ERROR: not a valid ELF binary"; exit 1; }
                echo "linux/arm64 ELF validated"
                ;;
              *darwin_amd64* | *darwin_arm64*)
                file "$binary" | grep -q "Mach-O" || { echo "ERROR: not a valid Mach-O binary"; exit 1; }
                echo "darwin binary validated"
                ;;
            esac
          done

          if [ "$found" -lt 4 ]; then
            echo "ERROR: expected at least 4 binaries, found $found"
            find dist -type f
            exit 1
          fi

      - name: Publish release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
