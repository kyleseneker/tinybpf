name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GOWORK: "off"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: false

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod
          if [ -f go.sum ]; then git diff --exit-code go.sum; fi

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Validate scripts
        run: |
          bash -n scripts/setup.sh
          bash -n scripts/create-vm.sh
          bash -n scripts/e2e.sh

      - name: Check documentation links
        run: |
          broken=0
          while IFS= read -r md; do
            dir=$(dirname "$md")
            while IFS= read -r link; do
              link=$(echo "$link" | sed 's/#.*//')
              if [ -n "$link" ] && [ ! -e "$dir/$link" ]; then
                echo "::error file=$md::broken link: $link"
                broken=1
              fi
            done < <(grep -oE '\]\([^)]+\)' "$md" | sed -E 's/^\]\(//;s/\)$//' | grep -v '^http' | grep -v '^#')
          done < <(find . -name '*.md' -not -path './.git/*')
          exit $broken

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check

      - name: Audit support matrix
        run: |
          status=0
          for gv in 1.24 1.25; do
            if ! grep -q "${gv}" docs/support-matrix.md; then
              echo "::error::Go ${gv}.x tested in CI but not in docs/support-matrix.md"
              status=1
            fi
          done
          for lv in 20 21 22; do
            if ! grep -q "LLVM.*${lv}" docs/support-matrix.md; then
              echo "::error::LLVM ${lv} tested in CI but not in docs/support-matrix.md"
              status=1
            fi
          done
          exit $status

  test:
    timeout-minutes: 15
    env:
      GOWORK: "off"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary lane: full validation (coverage, fuzz, binary size)
          - runner: ubuntu-24.04
            go-version: "1.25.x"
            llvm-version: "20"
            primary: true

          # Go/LLVM compatibility matrix (amd64)
          - runner: ubuntu-24.04
            go-version: "1.24.x"
            llvm-version: "20"
          - runner: ubuntu-24.04
            go-version: "1.24.x"
            llvm-version: "21"
          - runner: ubuntu-24.04
            go-version: "1.24.x"
            llvm-version: "22"
          - runner: ubuntu-24.04
            go-version: "1.25.x"
            llvm-version: "21"
          - runner: ubuntu-24.04
            go-version: "1.25.x"
            llvm-version: "22"

          # arm64 (production target)
          - runner: ubuntu-24.04-arm
            go-version: "1.25.x"
            llvm-version: "20"

          # macOS (developer experience, no LLVM)
          - runner: macos-latest
            go-version: "1.25.x"

    runs-on: ${{ matrix.runner }}
    name: test (${{ matrix.runner }}, go${{ matrix.go-version }}${{ matrix.llvm-version && format(', llvm{0}', matrix.llvm-version) || '' }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain
        if: matrix.llvm-version
        uses: ./.github/actions/setup-toolchain
        with:
          go-version: ${{ matrix.go-version }}

      - name: Setup Go (macOS)
        if: ${{ !matrix.llvm-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: false

      - name: Install LLVM
        if: matrix.llvm-version
        run: |
          codename=$(lsb_release -cs)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-${{ matrix.llvm-version }} main" | sudo tee /etc/apt/sources.list.d/llvm-${{ matrix.llvm-version }}.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-${{ matrix.llvm-version }}
          echo "/usr/lib/llvm-${{ matrix.llvm-version }}/bin" >> "$GITHUB_PATH"

      - name: Generate fresh IR fixture
        if: matrix.primary
        run: |
          cd examples/tracepoint-connect
          tinygo build -gc=none -scheduler=none -panic=trap -opt=1 -o ../../internal/ir/testdata/tinygo_probe.ll ./bpf

      - name: Print tool versions
        run: |
          go version
          if command -v llvm-link &>/dev/null; then
            echo "LLVM:   $(llvm-link --version 2>&1 | head -1)"
            echo "opt:    $(opt --version 2>&1 | head -1)"
            echo "llc:    $(llc --version 2>&1 | head -1)"
          else
            echo "LLVM:   not installed (unit tests only)"
          fi

      - name: Test
        run: go test -race -timeout 5m ./...

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags "-s -w" -trimpath -o tinybpf ./cmd/tinybpf

      - name: Binary size
        if: matrix.primary
        run: |
          size=$(stat --format=%s tinybpf)
          echo "Binary size: $(numfmt --to=iec $size)"
          max=$((15 * 1024 * 1024))
          if [ "$size" -gt "$max" ]; then
            echo "::error::Binary size ${size} exceeds ${max} byte threshold"
            exit 1
          fi

      - name: Coverage
        if: matrix.primary
        run: |
          go test -coverprofile=coverage.out ./...
          total=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${total}%"
          threshold=90
          if [ "$(echo "${total} < ${threshold}" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${total}% is below ${threshold}% threshold"
            exit 1
          fi

      - name: Cache fuzz corpus
        if: matrix.primary
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build/fuzz
          key: fuzz-${{ runner.os }}-${{ hashFiles('internal/transform/*_test.go') }}
          restore-keys: fuzz-${{ runner.os }}-

      - name: Fuzz smoke
        if: matrix.primary
        run: |
          fuzz_targets=$(grep -r '^func Fuzz' internal/transform/ --include='*_test.go' -l | sort -u)
          for file in $fuzz_targets; do
            dir=$(dirname "$file")
            for target in $(grep -oP '^func \KFuzz\w+' "$file"); do
              echo "--- fuzzing $target (10s) ---"
              go test "./$dir" -run "^${target}\$" -fuzz "^${target}\$" -fuzztime 10s -timeout 30s
            done
          done

  examples:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: false

      - name: Build all examples
        run: |
          for dir in examples/*/; do
            echo "--- $dir ---"
            (cd "$dir" && go build ./cmd/...)
          done

      - name: Vet all examples
        run: |
          for dir in examples/*/; do
            echo "--- vet $dir ---"
            (cd "$dir" && go vet ./...)
          done

      - name: Check go mod tidy
        run: |
          for dir in examples/*/; do
            echo "--- tidy $dir ---"
            (cd "$dir" && go mod tidy && git diff --exit-code go.mod go.sum)
          done

  bench:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    env:
      GOWORK: "off"
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: false

      - name: Benchmark PR
        run: go test -bench=. -benchmem -count=6 -timeout=5m ./internal/transform/ | tee /tmp/bench-pr.txt

      - name: Checkout base
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Benchmark base
        run: go test -bench=. -benchmem -count=6 -timeout=5m ./internal/transform/ 2>&1 | tee /tmp/bench-base.txt || true

      - name: Compare benchmarks
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          echo '## Benchmark comparison (base → PR)' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          if ! grep -q '^Benchmark' /tmp/bench-base.txt 2>/dev/null; then
            echo 'No benchmarks in base branch. PR results:' >> "$GITHUB_STEP_SUMMARY"
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep '^Benchmark' /tmp/bench-pr.txt >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            benchstat /tmp/bench-base.txt /tmp/bench-pr.txt >> "$GITHUB_STEP_SUMMARY" 2>&1
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
