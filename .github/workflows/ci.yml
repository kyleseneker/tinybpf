name: CI

# PR-gating workflow: the minimum required to catch real breakage on every
# push/PR. The broader compatibility matrix (multi-Go, multi-LLVM, arm64,
# macOS) has been moved to compat.yml and runs weekly / on demand.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GOWORK: "off"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: false

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod
          if [ -f go.sum ]; then git diff --exit-code go.sum; fi

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Validate scripts
        run: |
          bash -n scripts/setup.sh
          bash -n scripts/create-vm.sh
          bash -n scripts/e2e.sh

      - name: Check documentation links
        run: |
          broken=0
          while IFS= read -r md; do
            dir=$(dirname "$md")
            while IFS= read -r link; do
              link=$(echo "$link" | sed 's/#.*//')
              if [ -n "$link" ] && [ ! -e "$dir/$link" ]; then
                echo "::error file=$md::broken link: $link"
                broken=1
              fi
            done < <(grep -oE '\]\([^)]+\)' "$md" | sed -E 's/^\]\(//;s/\)$//' | grep -v '^http' | grep -v '^#')
          done < <(find . -name '*.md' -not -path './.git/*')
          exit $broken

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check

      - name: Audit support matrix
        # The weekly compat.yml run still exercises every cell in the support
        # matrix, so this audit stays honest even though PRs only run one cell.
        run: |
          status=0
          for gv in 1.24 1.25; do
            if ! grep -q "${gv}" docs/support-matrix.md; then
              echo "::error::Go ${gv}.x tested in CI but not in docs/support-matrix.md"
              status=1
            fi
          done
          for lv in 20 21 22; do
            if ! grep -q "LLVM.*${lv}" docs/support-matrix.md; then
              echo "::error::LLVM ${lv} tested in CI but not in docs/support-matrix.md"
              status=1
            fi
          done
          exit $status

  # Single PR-gating test lane: Linux amd64 + Go 1.25 + LLVM 20.
  # Everything that used to fan out (Go 1.24, LLVM 21/22, arm64, macOS) runs
  # weekly in compat.yml. This catches ~all real breakage with ~1/15 the cost.
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GOWORK: "off"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          go-version: "1.25.x"

      - name: Install LLVM
        run: |
          codename=$(lsb_release -cs)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-20 main" | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-20
          echo "/usr/lib/llvm-20/bin" >> "$GITHUB_PATH"

      - name: Generate fresh IR fixture
        run: |
          cd examples/tracepoint-connect
          tinygo build -gc=none -scheduler=none -panic=trap -opt=1 -o ../../internal/ir/testdata/tinygo_probe.ll ./bpf

      - name: Print tool versions
        run: |
          go version
          echo "LLVM:   $(llvm-link --version 2>&1 | head -1)"
          echo "opt:    $(opt --version 2>&1 | head -1)"
          echo "llc:    $(llc --version 2>&1 | head -1)"

      - name: Test
        run: go test -race -timeout 5m ./...

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags "-s -w" -trimpath -o tinybpf ./cmd/tinybpf

      - name: Binary size
        run: |
          size=$(stat --format=%s tinybpf)
          echo "Binary size: $(numfmt --to=iec $size)"
          max=$((15 * 1024 * 1024))
          if [ "$size" -gt "$max" ]; then
            echo "::error::Binary size ${size} exceeds ${max} byte threshold"
            exit 1
          fi

      - name: Coverage
        run: |
          go test -coverprofile=coverage.out ./...
          total=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${total}%"
          threshold=90
          if [ "$(echo "${total} < ${threshold}" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${total}% is below ${threshold}% threshold"
            exit 1
          fi

  examples:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: false

      - name: Build all examples
        run: |
          for dir in examples/*/; do
            echo "--- $dir ---"
            (cd "$dir" && go build ./cmd/...)
          done

      - name: Vet all examples
        run: |
          for dir in examples/*/; do
            echo "--- vet $dir ---"
            (cd "$dir" && go vet ./...)
          done

      - name: Check go mod tidy
        run: |
          for dir in examples/*/; do
            echo "--- tidy $dir ---"
            (cd "$dir" && go mod tidy && git diff --exit-code go.mod go.sum)
          done
