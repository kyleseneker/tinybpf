name: Helper Table Update

# Monthly refresh of the BPF helper table generated from the kernel's
# include/uapi/linux/bpf.h. Opens a PR if the upstream table has changed.
#
# The PR is a human-review step: merging requires explicit approval so that
# helper ID churn is noticed before it ships. No auto-merge.

on:
  workflow_dispatch:
    inputs:
      kernel-tag:
        description: "Kernel git tag to fetch bpf.h from (e.g. v6.18). Leave blank to auto-detect latest stable."
        required: false
        default: ""
  schedule:
    # First day of each month, 07:00 UTC.
    - cron: "0 7 1 * *"

permissions:
  contents: read

concurrency:
  group: helper-table-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    env:
      GOWORK: "off"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: false

      - name: Determine kernel tag
        id: tag
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.kernel-tag }}"
          if [ -z "${tag}" ]; then
            # kernel.org publishes a machine-readable release index. The
            # "latest_stable" field exposes the most recent mainline release
            # (e.g. "6.14"), which matches a tag in torvalds/linux. Point
            # releases ("6.14.2") live in the stable tree and aren't present
            # in torvalds/linux, so we deliberately don't use them here.
            json=$(curl -fsSL --retry 3 --retry-delay 5 https://www.kernel.org/releases.json)
            version=$(echo "${json}" | jq -r '.latest_stable.version // empty')
            if [ -z "${version}" ] || [ "${version}" = "null" ]; then
              echo "::error::Could not determine latest kernel version from kernel.org"
              exit 1
            fi
            # Strip any point-release suffix so we land on a mainline tag.
            major_minor=$(echo "${version}" | cut -d. -f1-2)
            tag="v${major_minor}"
          fi
          echo "Using kernel tag: ${tag}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Regenerate helper table
        run: |
          cd internal/transform
          go run gen.go -version "${{ steps.tag.outputs.tag }}"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- internal/transform/bpfhelpers_gen.go; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Helper table is already up to date for ${{ steps.tag.outputs.tag }}."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Helper table diff detected for ${{ steps.tag.outputs.tag }}:"
            git diff --stat -- internal/transform/bpfhelpers_gen.go
          fi

      - name: Verify regenerated table builds and tests pass
        if: steps.diff.outputs.changed == 'true'
        run: |
          go build ./...
          go test ./internal/transform/...

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update BPF helper table to kernel ${{ steps.tag.outputs.tag }}"
          branch: automation/helper-table-${{ steps.tag.outputs.tag }}
          delete-branch: true
          title: "chore: update BPF helper table to kernel ${{ steps.tag.outputs.tag }}"
          body: |
            Regenerates `internal/transform/bpfhelpers_gen.go` from the kernel's
            `include/uapi/linux/bpf.h` at tag **${{ steps.tag.outputs.tag }}**.

            Source:
            https://raw.githubusercontent.com/torvalds/linux/${{ steps.tag.outputs.tag }}/include/uapi/linux/bpf.h

            Generated by the `Helper Table Update` workflow (scheduled monthly).
            Please review the diff for unexpected helper ID churn before merging;
            helper IDs are ABI and should only ever be appended.
          labels: |
            automation
            dependencies
          add-paths: |
            internal/transform/bpfhelpers_gen.go
